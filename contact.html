<!DOCTYPE html>

<head>
  <meta charset="UTF-8" />
  <script>try{if(localStorage.getItem('ivis-theme')==='warm'){document.documentElement.dataset.theme='warm';document.documentElement.setAttribute('data-inverted','');}}catch(e){}</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ivis — Contact</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap" onload="this.onload=null;this.rel='stylesheet'" />
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap" /></noscript>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Contact 페이지 전용 — 폼 스타일 */
    .contact-form {
      display: flex;
      flex-direction: column;
      gap: .85rem;
      max-width: 460px;
      margin-top: 2.8rem;
    }
    .contact-form input,
    .contact-form textarea {
      width: 100%;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: .5rem;
      padding: .85rem 1.1rem;
      font-family: inherit;
      font-size: .9rem;
      font-weight: 300;
      color: inherit;
      outline: none;
      transition: border-color .2s;
      resize: none;
    }
    .contact-form input::placeholder,
    .contact-form textarea::placeholder { opacity: .35; }
    .contact-form input:focus,
    .contact-form textarea:focus { border-color: var(--accent); }
    .contact-form textarea { min-height: 120px; }
    .contact-form .btn-send {
      align-self: flex-start;
      padding: .75rem 2.2rem;
      border-radius: 2rem;
      border: 1.5px solid var(--accent);
      background: transparent;
      color: inherit;
      font-family: inherit;
      font-size: .8rem;
      letter-spacing: .1em;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: color .3s, box-shadow .3s;
    }
    .contact-form .btn-send > span { position: relative; z-index: 1; }
    .contact-form .btn-send::before {
      content: '';
      position: absolute;
      left: 50%; bottom: 0;
      width: 130%; aspect-ratio: 1;
      background: var(--accent);
      border-radius: 50%;
      transform: translate(-50%, 112%);
      transition: transform .65s cubic-bezier(0.19, 1, 0.22, 1);
    }
    .contact-form .btn-send:hover::before { transform: translate(-50%, 22%); }
    .contact-form .btn-send:hover { box-shadow: 0 6px 24px var(--accent-glow); }
  </style>
</head>
<body>

  <!-- ══ Theme Cord ══ -->
  <div class="theme-cord" id="themeCord">
    <div class="cord-line"></div>
    <button class="cord-knob" id="cordPull" aria-label="색온도 전환 (cool ↔ warm)">
      <span class="cord-dot"></span>
    </button>
    <span class="cord-label" id="cordLabel">Pull to shift</span>
  </div>

  <!-- ══ Navigation ══ -->

      <li><a href="contact.html" aria-current="page">Contact</a></li>
    </ul>
  </nav>

  <!-- ══ Contact ══ -->

      <!-- ✏️ 폼 — Formspree 등 외부 서비스 연동 시 action 속성 추가 -->
      <form class="contact-form" action="#" onsubmit="return false;">
        <label class="sr-only" for="contactName">이름</label>
        <input id="contactName" type="text" name="name" placeholder="이름" autocomplete="name" />
        <label class="sr-only" for="contactEmail">이메일</label>
        <input id="contactEmail" type="email" name="email" placeholder="이메일" autocomplete="email" />
        <label class="sr-only" for="contactMessage">메시지</label>
        <textarea id="contactMessage" name="message" placeholder="메시지를 남겨주세요."></textarea>
        <button type="submit" class="btn-send"><span>보내기 &rarr;</span></button>
      </form>

      <p class="contact-footer" style="margin-top:3rem;">&copy; 2025 ivis. All rights reserved.</p>
    </div>
  </section>
